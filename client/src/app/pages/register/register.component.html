<div class="auth-page">
  <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-subtitle">Commence à réviser en musique</p>

    <mat-form-field appearance="outline">
      <mat-label>Nom d'utilisateur</mat-label>
      <input matInput type="text" formControlName="username" autocomplete="username" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" autocomplete="email" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Mot de passe</mat-label>
      <input matInput type="password" formControlName="password" autocomplete="new-password" />
      <mat-hint>8 caractères minimum</mat-hint>
    </mat-form-field>

    @if (errorMessage()) {
      <p class="auth-error" role="alert">{{ errorMessage() }}</p>
    }

    <button mat-flat-button color="primary" type="submit" [disabled]="loading()">
      {{ loading() ? 'Création…' : 'Créer mon compte' }}
    </button>

    <p class="auth-switch">
      Déjà un compte ?
      <a routerLink="/login">Se connecter</a>
    </p>
  </form>
</div>
