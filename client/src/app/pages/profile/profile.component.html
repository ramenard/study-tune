<div class="profile">
  <h1 class="page-title">Mon Profil</h1>

  <div class="identity-card">
    <div class="avatar">{{ initials() }}</div>
    <div class="identity-card__info">
      <div class="identity-card__name">{{ username() || '—' }}</div>
      <div class="identity-card__email">{{ profile()?.email }}</div>
    </div>
    <span class="plan-badge" [class.plan-badge--premium]="isPremium()">{{ planLabel() }}</span>
  </div>

  <div class="info-card">
    <div class="info-row">
      <span class="info-row__label"><mat-icon>bolt</mat-icon> Générations ce mois</span>
      <span class="info-row__value">{{ generationsRemaining() }} / {{ monthlyAllowance() }}</span>
    </div>
    <div class="info-row">
      <span class="info-row__label"><mat-icon>workspace_premium</mat-icon> Offre</span>
      <span class="info-row__value">{{ planLabel() }}</span>
    </div>
    @if (memberSince()) {
      <div class="info-row">
        <span class="info-row__label"><mat-icon>calendar_today</mat-icon> Membre depuis</span>
        <span class="info-row__value">{{ memberSince() }}</span>
      </div>
    }
  </div>

  <div class="profile-actions">
    <button mat-flat-button color="primary" (click)="goToSubscription()">
      <mat-icon>workspace_premium</mat-icon>
      Gérer l'abonnement
    </button>
    <button mat-stroked-button class="logout" (click)="logout()">
      <mat-icon>logout</mat-icon>
      Déconnexion
    </button>
  </div>
</div>
