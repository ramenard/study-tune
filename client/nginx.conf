server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the api service (same-origin, no CORS needed).
  # The upstream is resolved at request time via Docker's embedded DNS so
  # nginx starts even if the api container is not up yet.
  location /api/ {
    resolver 127.0.0.11 valid=30s;
    set $upstream http://api:3001;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback: unknown routes are served by index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
